<html>
<head>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Rochester&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="logo.png">
<title>AIWeb</title>
<style>
* {
    scroll-behavior: smooth;
}

text {
  color: lch(from var(--bg-color) calc(100 - l) c h);
}

body {
  height: 100%;
  margin: 0;
  padding: 0;
  overflow-x: hidden;
  max-width: 100%;
  font-family: "Audiowide", sans-serif;
  font-style: normal;
  color: lch(from var(--bg-color) calc(100 - l) c h);
}

.page-wrapper {
  overflow-x: hidden;
  width: 100%;
  max-width: 100vw;
}

.scroll-arrow {
  position: absolute;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 3vw;
  color: white;
  text-decoration: none;
  animation: bounce 2s infinite;
  cursor: pointer;
}

@keyframes bounce {
  0%, 20%, 50%, 80%, 100% {transform: translateX(-50%) translateY(0);}
  40% {transform: translateX(-50%) translateY(-20px);}
  60% {transform: translateX(-50%) translateY(-10px);}
}

.section1 {
  background-image: url(background1.jpg);
  background-size: 120%;        
  background-position: center;
  background-attachment: fixed;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: subtleZoom 16s ease-in-out infinite alternate;
}

@keyframes subtleZoom {
  0%   { background-size: 110%; background-position: 40% 40%; }
  50%  { background-size: 125%; background-position: 55% 50%; }
  100% { background-size: 115%; background-position: 50% 60%; }
}

.section2 {
  display: flex;
  flex-direction: column;    
  align-items: center; 
  gap: 2vw;
  padding: 3vw;
  background-color: rgba(255,255,255,0.85);
  border-radius: 2vw;
  box-shadow: 0 8px 32px rgba(0,0,0,0.15);
  width: 90%;
}

.image-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 18%;
  flex-shrink: 0;    
}

.image-card img {
  width: 100%;
  height: 20vw;
  object-fit: cover;
  display: block;
  transition: transform 0.5s ease;
  cursor: pointer;
}

.image-card img:hover {
  transform: scale(1.05);
}

.image-row {
  display: flex;
  justify-content: center;
  gap: 2vw;
  width: 100%;
  align-items: flex-start; 
}

.image-card p {
  font-size: 1.5vw;
  text-align: center;
  margin-top: 1vw;
  color: black;
  filter: blur(16px);
  transition: filter 0.4s ease;
  user-select: none;
}

.image-card p.revealed {
  filter: blur(0);
}

#headerh1 {
  font-size: 10vw;
  margin: 0;
  line-height: 1;
  font-weight: 50;
  text-align: center;
}

h1 {
  font-size: 10vw;
  margin: 0;
  line-height: 1;
  font-weight: 50;
}

h2 {
  font-size: 4vw;
  margin: 0;
  line-height: 1;
  font-weight: 50;
}

#headerp {
  font-size: 3vw;
  margin: 0;
  line-height: 1;
  text-align: center;
}

#section2p {
  font-size: 2vw;
  margin: 0;
  line-height: 1;
}

p {
  font-size: 3vw;
  margin: 0;
  line-height: 1;
}

a {
  font-size: 1vw;
  margin-left: 1vw;
  text-decoration: none;
  color: black;
}

a:hover {
  text-decoration: underline;
}

footer {
  background-color: white;
  width: 100%;
  height: 2%;
}

header {
  width: 100%;
  height: 3%;
  position: fixed;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

li {
  justify-content: right;
  display: flex;
  gap: 2vw;
}

nav {
  display: flex;
  list-style: none;
  margin: 0;
  padding: 0;
  gap: 2vw;
  margin-right: 1vw;
}

li:hover {
  text-decoration: underline;
}

/* ── AI Generator styles ── */
.generator-wrapper {
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1.5vw;
}

.prompt-row {
  display: flex;
  gap: 1vw;
  width: 100%;
  justify-content: center;
}

.prompt-input {
  font-family: "Audiowide", sans-serif;
  font-size: 1.2vw;
  padding: 0.8vw 1.5vw;
  border: 2px solid #ccc;
  border-radius: 1vw;
  width: 40%;
  outline: none;
  transition: border 0.3s;
}

.prompt-input:focus {
  border-color: #888;
}

.generate-btn {
  font-family: "Audiowide", sans-serif;
  font-size: 1.2vw;
  padding: 0.8vw 2vw;
  background: black;
  color: white;
  border: none;
  border-radius: 1vw;
  cursor: pointer;
  transition: background 0.3s;
}

.generate-btn:hover {
  background: #333;
}

.generate-btn:disabled {
  background: #aaa;
  cursor: not-allowed;
}

.status-text {
  font-size: 1vw;
  color: #555;
  min-height: 1.5vw;
}

.preview-container {
  width: 100%;
  border-radius: 1vw;
  overflow: hidden;
  box-shadow: 0 4px 20px rgba(0,0,0,0.1);
  display: none;
}

.preview-container iframe {
  width: 100%;
  height: 60vw;
  border: none;
  display: block;
}

.download-btn {
  font-family: "Audiowide", sans-serif;
  font-size: 1vw;
  padding: 0.8vw 2vw;
  background: white;
  color: black;
  border: 2px solid black;
  border-radius: 1vw;
  cursor: pointer;
  transition: all 0.3s;
  display: none;
}

.download-btn:hover {
  background: black;
  color: white;
}
</style>
<body>
<div class="page-wrapper" id="top">

<header>
  <a href="#top"> AIWeb generation </a>
   <nav> 
    <li><a href="index.html">Home</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="creation.html">Creation</a></li>
   </nav>
</header>

<div class="section1">
 <div class="section1text">
  <h1 id="#headerh1"> Website Creation </h1>
  <br>
  <p id="#headerp"> Full website with a simple prompt </p>
 </div>
</div>

<div class="section1">
 <div class="section2">
  <h2>Generate a Website</h2>
  <p id="section2p" style="font-size:1.2vw; color:#444;">Type anything (the longer the better!) and AI will build you a full website.</p>

  <div class="generator-wrapper">
    <div class="prompt-row">
      <input class="prompt-input" id="promptInput" type="text" placeholder="e.g. pizza restaurant" maxlength="50">
      <button class="generate-btn" id="generateBtn" onclick="generateWebsite()">Generate</button>
    </div>
    <p class="status-text" id="statusText"></p>
    <button class="download-btn" id="downloadBtn">Download Website</button>
    <div class="preview-container" id="previewContainer">
      <iframe id="previewFrame"></iframe>
    </div>
  </div>

 </div>
</div>

</div>

<script>
  // ── Fade + slide up on scroll ────────────────────────────────
  const textElements = document.querySelectorAll('h1, h2, h3, p, a:not(.scroll-arrow)');

  textElements.forEach((el, i) => {
    el.style.opacity = '0';
    el.style.transform = 'translateY(30px)';
    el.style.transition = 'opacity 0.8s ease, transform 0.8s ease';
    el.style.transitionDelay = `${(i % 5) * 0.1}s`;
  });

  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.style.opacity = '1';
        entry.target.style.transform = 'translateY(0)';
      } else {
        entry.target.style.opacity = '0';
        entry.target.style.transform = 'translateY(30px)';
      }
    });
  }, { threshold: 0.2 });

  textElements.forEach(el => observer.observe(el));

  // ── Subtle floating effect on headings ──────────────────────
  document.querySelectorAll('h1, h2').forEach(el => {
    let start = null;
    const offset = Math.random() * 1000;

    function float(timestamp) {
      if (!start) start = timestamp;
      const elapsed = (timestamp - start + offset) / 1000;
      const y = Math.sin(elapsed * 0.8) * 6;
      el.style.transform = `translateY(${y}px)`;
      requestAnimationFrame(float);
    }
    requestAnimationFrame(float);
  });

  // ── Typewriter effect on paragraph text when scrolled in ────
  const paras = document.querySelectorAll('#section2p, #headerp');
  const typed = new Set();

  const typeObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting && !typed.has(entry.target)) {
        typed.add(entry.target);
        const el = entry.target;
        const text = el.textContent;
        el.textContent = '';
        el.style.opacity = '1';
        text.split('').forEach((char, i) => {
          setTimeout(() => {
            el.textContent += char;
          }, i * 30);
        });
      }
    });
  }, { threshold: 0.5 });

  paras.forEach(el => typeObserver.observe(el));

  // ── Reveal text on image click ───────────────────────────────
  document.querySelectorAll('.image-card').forEach(card => {
    const img = card.querySelector('img');
    const text = card.querySelector('p');
    if (img && text) {
      img.addEventListener('click', () => {
        text.classList.toggle('revealed');
      });
    }
  });

  // ── AI Website Generator ─────────────────────────────────────
  let generatedHTML = '';

  async function generateWebsite() {
    const prompt = document.getElementById('promptInput').value.trim();
    if (!prompt) return;

    const btn = document.getElementById('generateBtn');
    const status = document.getElementById('statusText');
    const previewContainer = document.getElementById('previewContainer');
    const previewFrame = document.getElementById('previewFrame');
    const downloadBtn = document.getElementById('downloadBtn');

    btn.disabled = true;
    status.textContent = 'Generating your website...';
    previewContainer.style.display = 'none';
    downloadBtn.style.display = 'none';

    try {
      const response = await fetch('https://backend-nu-nine-8wiy9pdpal.vercel.app/api/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt })
      });

      const data = await response.json();
console.log('Response from backend:', JSON.stringify(data));
generatedHTML = data.html;

      // Show in iframe
      previewFrame.srcdoc = generatedHTML;
      previewContainer.style.display = 'block';
      downloadBtn.style.display = 'inline-block';
      status.textContent = 'Website generated! Scroll down to preview it.';

      // Download button
      downloadBtn.onclick = () => {
        const blob = new Blob([generatedHTML], { type: 'text/html' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = prompt.replace(/\s+/g, '-') + '.html';
        a.click();
        URL.revokeObjectURL(url);
      };

    } catch (err) {
      status.textContent = 'Something went wrong. Please try again.';
      console.error(err);
    }

    btn.disabled = false;
  }
  
  // Allow Enter key to generate
  document.getElementById('promptInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') generateWebsite();
  });
    
</script>

</body>
</html>
